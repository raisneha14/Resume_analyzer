<!DOCTYPE html>
<html>
<head>
    <title>Resume Skill Gap</title>
    <style>
        body {
            font-family: Arial;
            background: #8bbae6;
            text-align: center;
        }

        .box {
            background: rgb(238, 235, 235);
            width: 400px;
            margin: auto;
            margin-top: 50px;
            padding: 20px;
            border-radius: 10px;
        }

        input, button {
            width: 90%;
            padding: 10px;
            margin: 10px 0;
        }

        button {
            background: #000205c3;
            color: rgb(230, 226, 226);
            border: none;
        }

        .green { color: green; }
        .red { color: red; }
    </style>
</head>
<body>

<h1>Resume Skill Gap</h1>
<p>AI Resume Screening System</p>

<div class="box">
<form id="form">
    <input type="file" name="file" required><br>
    <input type="text" name="job_title" placeholder="Enter Job Title"><br>
    <button type="submit">Analyze Profile</button>
</form>

<div id="result"></div>
</div>

<script>
document.getElementById("form").onsubmit = async (e) => {
    e.preventDefault();

    let formData = new FormData(e.target);

    let res = await fetch("/analyze", {
        method: "POST",
        body: formData
    });

    let data = await res.json();

    document.getElementById("result").innerHTML = `
        <h2>Match Score: ${data.match_score}%</h2>
        <h3>${data.decision}</h3>
        <h4>${data.category}</h4>

        <p><b>Matched Skills:</b><br>
        <span class="green">${data.matched_skills.join(", ")}</span></p>

        <p><b>Skill Gaps:</b><br>
        <span class="red">${data.missing_skills.join(", ")}</span></p>
    `;
};
</script>

</body>
</html>
